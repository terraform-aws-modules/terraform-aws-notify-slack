# mise
min_version = { hard = "2026.4.8" }

[tools]
"pre-commit" = "4.6.0"
terraform = "1.5.7"
"terraform-docs" = "0.24.0"
tflint = "0.62.1"

[settings]
lockfile = true
locked = true
lockfile_platforms = ["linux-x64", "macos-arm64"]  # requires mise >= 2026.4.8

[shell_alias]
asdf = "echo \"⚠️  It looks like you're using asdf. How nostalgic! \n This project is now using mise.\n Join us in the future whenever you're ready to pick up the new hotness and drop that old and busted asdf.\" && mise"
